name: Scrape Telegram Channel

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper
        env:
          TELEGRAM_CHANNEL: loaderfromSVO
          MESSAGES_LIMIT: "5000"
        run: python scripts/scrape_to_json.py

      - name: Sync shared CSS to tg-feed frontend
        run: cp docs/style.css tg-feed/frontend/style.css

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/posts.json tg-feed/frontend/style.css
          if git diff --cached --quiet; then
            echo "No changes."
          else
            COUNT=$(python -c "import json; d=json.load(open('docs/data/posts.json')); print(len(d['posts']))")
            git commit -m "chore: update feed — ${COUNT} posts [skip ci]"
            git push
          fi
