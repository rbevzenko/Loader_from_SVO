name: Scrape Telegram Channel

on:
  schedule:
    # Every 30 minutes (GitHub Actions minimum reliable interval)
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Allow manual trigger from Actions tab

permissions:
  contents: write      # Needed to commit and push updated JSON/media

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the branch that GitHub Pages serves from
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_API_ID:      ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:    ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STR: ${{ secrets.TELEGRAM_SESSION_STR }}
          TELEGRAM_CHANNEL:     loaderfromSVO
          MESSAGES_LIMIT:       "50"
        run: python scripts/scrape_to_json.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/posts.json docs/media/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            COUNT=$(python -c "import json; d=json.load(open('docs/data/posts.json')); print(len(d['posts']))")
            git commit -m "chore: update feed — ${COUNT} posts [skip ci]"
            git push
          fi
