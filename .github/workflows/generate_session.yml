name: "Generate Session — Step 1: Send Code"

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Номер телефона с кодом страны (например +79991234567)'
        required: true
      api_id:
        description: 'TELEGRAM_API_ID (число с my.telegram.org)'
        required: true
      api_hash:
        description: 'TELEGRAM_API_HASH (строка с my.telegram.org)'
        required: true

permissions:
  actions: write
  contents: read

jobs:
  send_code:
    runs-on: ubuntu-latest
    steps:
      - name: Install telethon
        run: pip install telethon

      - name: Send auth code to Telegram
        env:
          PHONE:    ${{ github.event.inputs.phone }}
          API_ID:   ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
        run: |
          python3 - << 'EOF'
          import asyncio, os
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          async def main():
              client = TelegramClient(
                  StringSession(),
                  int(os.environ["API_ID"]),
                  os.environ["API_HASH"],
              )
              await client.connect()
              await client.send_code_request(os.environ["PHONE"])
              session = client.session.save()
              with open("partial_session.txt", "w") as f:
                  f.write(session)
              print("Код отправлен в Telegram!")
              print("Запусти Step 2 и введи полученный код.")

          asyncio.run(main())
          EOF

      - name: Store partial session in repository variable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SESSION=$(cat partial_session.txt)
          gh api --method POST \
            "repos/${{ github.repository }}/actions/variables" \
            -f name=PARTIAL_SESSION \
            -f value="$SESSION" 2>/dev/null || \
          gh api --method PATCH \
            "repos/${{ github.repository }}/actions/variables/PARTIAL_SESSION" \
            -f name=PARTIAL_SESSION \
            -f value="$SESSION"
          echo "Partial session saved. Run Step 2 now."
