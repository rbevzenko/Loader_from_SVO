name: Generate Telegram Session (run once)

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: 'TELEGRAM_API_ID (число с my.telegram.org)'
        required: true
      api_hash:
        description: 'TELEGRAM_API_HASH (строка с my.telegram.org)'
        required: true
      bot_token:
        description: 'Bot Token (от @BotFather)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Install telethon
        run: pip install telethon

      - name: Generate session string
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          BOT_TOKEN: ${{ github.event.inputs.bot_token }}
        run: |
          cat > /tmp/gen_session.py << 'PYEOF'
import asyncio
import os
from telethon import TelegramClient
from telethon.sessions import StringSession

async def main():
    api_id = int(os.environ["API_ID"])
    api_hash = os.environ["API_HASH"]
    bot_token = os.environ["BOT_TOKEN"]

    print(f"Connecting with API_ID={api_id}...")
    client = TelegramClient(StringSession(), api_id, api_hash)
    await client.start(bot_token=bot_token)
    me = await client.get_me()
    print(f"Connected as: {me.username} (id={me.id})")

    session = client.session.save()
    await client.disconnect()

    print()
    print("=" * 60)
    print("TELEGRAM_SESSION_STR =", session)
    print("=" * 60)
    print()
    print("Скопируй строку после '= ' и добавь в GitHub Secrets")
    print("как TELEGRAM_SESSION_STR")

asyncio.run(main())
PYEOF
          python /tmp/gen_session.py
