<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Загрузчик из СВО</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="channel-avatar">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="#2AABEE"/>
          <path d="M34.5 14L10 23l8 3 2 7 4-4 6 5 4.5-20z" fill="white"/>
        </svg>
      </div>
      <div class="channel-info">
        <h1 class="channel-name">Загрузчик из СВО</h1>
        <a class="channel-handle" href="https://t.me/loaderfromSVO" target="_blank" rel="noopener">@loaderfromSVO</a>
      </div>
      <div class="updated-badge" id="updatedBadge" title="Время последнего обновления">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
        <span id="updatedText">—</span>
      </div>
    </div>
  </header>

  <main class="feed-container">
    <div id="postFeed" class="post-feed" role="feed" aria-label="Лента постов"></div>

    <div id="loadingSpinner" class="loading-spinner" aria-live="polite">
      <div class="spinner"></div>
      <span>Загрузка постов...</span>
    </div>

    <div id="loadMoreWrap" class="load-more-wrap hidden">
      <button id="loadMoreBtn" class="load-more-btn">Загрузить ещё</button>
    </div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <h2>Нет постов</h2>
      <p>Посты появятся здесь после первого запуска GitHub Action.</p>
    </div>

    <div id="errorState" class="error-state hidden">
      <div class="error-icon">⚠️</div>
      <h2>Ошибка загрузки</h2>
      <p id="errorMessage">Не удалось загрузить данные.</p>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightboxClose" aria-label="Закрыть">&times;</button>
    <div class="lightbox-content" id="lightboxContent"></div>
    <button class="lightbox-prev hidden" id="lightboxPrev" aria-label="Предыдущее">&#10094;</button>
    <button class="lightbox-next hidden" id="lightboxNext" aria-label="Следующее">&#10095;</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
