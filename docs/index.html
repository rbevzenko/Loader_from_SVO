<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Грузчик из Шереметьево</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1B3A6B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Грузчик SVO" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="channel-avatar">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Dark navy background -->
          <circle cx="50" cy="50" r="50" fill="#1B3A6B"/>
          <!-- "Loader from" top line -->
          <text x="50" y="40"
            font-family="Georgia, 'Times New Roman', serif"
            font-style="italic"
            font-weight="bold"
            font-size="13.5"
            fill="white"
            text-anchor="middle"
            letter-spacing="0.3">Loader from</text>
          <!-- "SVO" main word -->
          <text x="50" y="56"
            font-family="Georgia, 'Times New Roman', serif"
            font-style="italic"
            font-weight="bold"
            font-size="18"
            fill="white"
            text-anchor="middle"
            letter-spacing="1">SVO</text>
          <!-- Swoosh underline (baseball jersey style) -->
          <path d="M16 66 Q33 60 50 61 Q67 60 84 66 Q80 74 50 76 Q20 74 16 66 Z" fill="white"/>
        </svg>
      </div>
      <div class="channel-info">
        <h1 class="channel-name">Грузчик из Шереметьево</h1>
        <a class="channel-handle" href="https://t.me/loaderfromSVO" target="_blank" rel="noopener">@loaderfromSVO</a>
      </div>
      <div class="updated-badge" id="updatedBadge" title="Время последнего обновления">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
        <span id="updatedText">—</span>
      </div>
    </div>
  </header>

  <main class="feed-container">
    <div id="postFeed" class="post-feed" role="feed" aria-label="Лента постов"></div>

    <div id="loadingSpinner" class="loading-spinner" aria-live="polite">
      <div class="spinner"></div>
      <span>Загрузка постов...</span>
    </div>

    <div id="loadMoreWrap" class="load-more-wrap hidden">
      <button id="loadMoreBtn" class="load-more-btn">Загрузить ещё</button>
    </div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <h2>Нет постов</h2>
      <p>Посты появятся здесь после первого запуска GitHub Action.</p>
    </div>

    <div id="errorState" class="error-state hidden">
      <div class="error-icon">⚠️</div>
      <h2>Ошибка загрузки</h2>
      <p id="errorMessage">Не удалось загрузить данные.</p>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightboxClose" aria-label="Закрыть">&times;</button>
    <div class="lightbox-content" id="lightboxContent"></div>
    <button class="lightbox-prev hidden" id="lightboxPrev" aria-label="Предыдущее">&#10094;</button>
    <button class="lightbox-next hidden" id="lightboxNext" aria-label="Следующее">&#10095;</button>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
