<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Загрузчик из СВО</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Apply theme before render to prevent flash
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="channel-avatar">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="#2AABEE"/>
          <path d="M34.5 14L10 23l8 3 2 7 4-4 6 5 4.5-20z" fill="white"/>
        </svg>
      </div>
      <div class="channel-info">
        <h1 class="channel-name">Загрузчик из СВО</h1>
        <p class="channel-handle">@loaderfromSVO</p>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему" title="Переключить тему">
        <span class="theme-toggle-thumb">
          <!-- Sun icon -->
          <svg class="icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4.5a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 0112 4.5zm0 13.5a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 0112 18zm7.5-7.5a.75.75 0 010 1.5h-1.5a.75.75 0 010-1.5h1.5zM6 12a.75.75 0 01-.75.75H3.75a.75.75 0 010-1.5H5.25A.75.75 0 016 12zm9.53-4.47a.75.75 0 010 1.06l-1.06 1.06a.75.75 0 11-1.06-1.06l1.06-1.06a.75.75 0 011.06 0zM8.47 16.47a.75.75 0 010 1.06l-1.06 1.06a.75.75 0 11-1.06-1.06l1.06-1.06a.75.75 0 011.06 0zm9.12 1.06a.75.75 0 11-1.06 1.06l-1.06-1.06a.75.75 0 111.06-1.06l1.06 1.06zM7.47 8.53a.75.75 0 11-1.06-1.06L7.47 6.41a.75.75 0 111.06 1.06L7.47 8.53zM12 8.25a3.75 3.75 0 100 7.5 3.75 3.75 0 000-7.5z"/>
          </svg>
          <!-- Moon icon -->
          <svg class="icon-moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21.75 12A9.75 9.75 0 0112 21.75 9.75 9.75 0 012.25 12 9.75 9.75 0 0112 2.25c.28 0 .558.012.832.034a.75.75 0 01.354 1.322A7.5 7.5 0 1019.5 12a7.46 7.46 0 00-.524-2.773.75.75 0 01.956-1.003c1.155.468 1.818 1.43 1.818 3.776z"/>
          </svg>
        </span>
      </button>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text">Загрузка...</span>
      </div>
    </div>
  </header>

  <main class="feed-container">
    <div id="postFeed" class="post-feed" role="feed" aria-label="Лента постов"></div>

    <div id="loadingSpinner" class="loading-spinner hidden" aria-live="polite">
      <div class="spinner"></div>
      <span>Загрузка постов...</span>
    </div>

    <div id="loadMoreWrap" class="load-more-wrap hidden">
      <button id="loadMoreBtn" class="load-more-btn">Загрузить ещё</button>
    </div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <h2>Нет постов</h2>
      <p>Посты из канала появятся здесь после первого запуска скрапера.</p>
    </div>

    <div id="errorState" class="error-state hidden">
      <div class="error-icon">⚠️</div>
      <h2>Ошибка загрузки</h2>
      <p id="errorMessage">Не удалось подключиться к серверу.</p>
      <button onclick="app.reload()" class="retry-btn">Повторить</button>
    </div>
  </main>

  <!-- Lightbox for media -->
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Просмотр медиа">
    <button class="lightbox-close" id="lightboxClose" aria-label="Закрыть">&times;</button>
    <div class="lightbox-content" id="lightboxContent"></div>
    <button class="lightbox-prev hidden" id="lightboxPrev" aria-label="Предыдущее">&#10094;</button>
    <button class="lightbox-next hidden" id="lightboxNext" aria-label="Следующее">&#10095;</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
